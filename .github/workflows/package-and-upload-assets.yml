name: Package and Upload Release Assets

on:
  release:
    types: [created]

  # This allows you to run the workflow manually from the Actions tab
  workflow_dispatch:

  permissions:
    # This permission is required for the action to create a GitHub Release
    contents: write

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    steps:
      # 1. Checks out your repository's code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Sets up the Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify the Node.js version you use
          cache: 'npm'

      # 3. Install MCP server dependencies
      # The MCP server needs its dependencies bundled in the release
      - name: Install MCP server dependencies
        run: cd mcp-server && npm ci

      # 4. Runs your build script
      # This assumes 'npm run build' creates a 'dist' or 'build' folder.
      # If your build output is different, change the 'tar' command below.
      - name: Run build
        run: npm run build

      # 5. Create TAR archive with MCP server dependencies
      # Exclude root node_modules but INCLUDE mcp-server/node_modules
      - name: Create TAR archive
        run: tar -cvzf ../security-release.tar.gz --exclude='.git' --exclude='.github' --exclude='./node_modules' . && mv ../security-release.tar.gz .
  
      # 6. Upload the TAR archive as a release asset
      - name: Upload archive to GitHub Release
        run: |
          gh release upload \
            ${{ github.event.release.tag_name }} \
            security-release.tar.gz
